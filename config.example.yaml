# Red Team AI Benchmark Configuration Example
# Copy to config.yaml and customize

# LLM Provider Settings
provider:
  name: ollama # ollama, lmstudio, openwebui, openrouter
  endpoint: http://localhost:11434
  # api_key: sk-xxx           # API key (optional for ollama/openwebui, required for openrouter)
  # api_key_env: OPENROUTER_API_KEY  # Or use env variable
  # default_model: llama3.1:8b
  # keep_alive: 30m           # Ollama-only keep_alive for /api/chat

# OpenWebUI Provider Example (uncomment to use):
# provider:
#   name: openwebui
#   endpoint: http://localhost:3000
#   api_key: sk-xxx  # Optional - only if auth is enabled on your instance

# Scoring System Configuration
scoring:
  method: rubric

# Export Settings
export:
  formats:
    - json
    - csv
    - criteria_csv
  output_dir: ./results
  include_response: true

# Prompt Optimization (for censored responses)
optimization:
  enabled: false
  optimizer_model: llama3.3:70b
  # optimizer_endpoint: http://localhost:11434  # Optional custom endpoint
  max_iterations: 3
  strategies:
    - role_playing
    - technical
    - few_shot
    - cve_framing

# Benchmark Settings
questions_file: datasets/v2/benchmark.jsonl
answers_file: answers_all.txt
rate_limit_delay: 1.5
max_tokens: 1024
temperature: 0.2
concurrency: 1
# request_log: ./results/requests.jsonl  # Optional append-only per-question JSONL log

# Langfuse Observability
langfuse:
  enabled: false  # Set to true to enable tracing
  # secret_key: sk-lf-xxx
  # public_key: pk-lf-xxx
  host: http://localhost:3000
