name: Bug report
description: Report a reproducible problem in the benchmark
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, config, provider, model, and relevant output.
      placeholder: |
        uv run run_benchmark.py ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit, tag, or package version.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Do not include API keys, secrets, or private target data.
